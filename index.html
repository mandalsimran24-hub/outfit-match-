<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Outfit Match — daily styling helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --clay: #EDE6DB;
    --clay-deep: #E2D9C9;
    --ink: #2B2622;
    --ink-soft: #6B6259;
    --rose: #C17A6F;
    --rose-deep: #9C5A50;
    --sage: #8A9A6E;
    --sage-deep: #5F6E47;
    --gold: #C9A24B;
    --card: #FAF7F1;
    --line: rgba(43,38,34,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--clay);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:880px;margin:0 auto;padding:48px 24px 80px;}

  /* header */
  header{margin-bottom:40px;}
  .eyebrow{
    font-size:12px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--rose-deep);font-weight:600;margin:0 0 8px;
  }
  h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:40px;
    margin:0 0 10px;
    line-height:1.1;
  }
  .sub{color:var(--ink-soft);font-size:15px;max-width:520px;line-height:1.6;margin:0;}

  /* tag selector */
  .event-rail{
    display:flex;flex-wrap:wrap;gap:8px;margin:28px 0 36px;
  }
  .tag{
    font-family:'Inter',sans-serif;
    font-size:13px;font-weight:500;
    padding:9px 16px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
  }
  .tag:hover{border-color:var(--rose);color:var(--ink);}
  .tag.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--clay);
  }

  /* sections */
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:44px 0 18px;
  }
  .section-head h2{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:22px;margin:0;
  }
  .count{font-size:13px;color:var(--ink-soft);}

  /* add item form */
  .add-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 22px;
    margin-bottom:8px;
  }
  .add-grid{
    display:grid;
    grid-template-columns:1.4fr 1fr 1fr auto;
    gap:10px;
    align-items:end;
  }
  .field label{
    display:block;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:6px;font-weight:600;
  }
  .field input[type=text], .field select{
    width:100%;
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    padding:9px 10px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    color:var(--ink);
  }
  .field input[type=text]:focus, .field select:focus{
    outline:none;border-color:var(--rose);
  }
  .color-field{display:flex;align-items:center;gap:8px;}
  .color-field input[type=color]{
    width:38px;height:38px;border:1px solid var(--line);border-radius:8px;
    padding:2px;background:#fff;cursor:pointer;
  }
  .btn-add{
    background:var(--ink);color:var(--clay);
    border:none;border-radius:8px;
    padding:10px 18px;
    font-size:14px;font-weight:500;
    cursor:pointer;
    white-space:nowrap;
    font-family:'Inter',sans-serif;
  }
  .btn-add:hover{background:var(--rose-deep);}

  /* wardrobe shelves */
  .shelf{margin-bottom:28px;}
  .shelf-label{
    font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--rose-deep);margin:0 0 10px;
  }
  .shelf-items{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:10px;
  }
  .item-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px;
    position:relative;
  }
  .swatch{
    width:100%;height:46px;border-radius:8px;margin-bottom:10px;
    border:1px solid rgba(0,0,0,0.08);
  }
  .item-name{font-size:13px;font-weight:600;margin:0 0 2px;line-height:1.3;}
  .item-meta{font-size:11px;color:var(--ink-soft);margin:0;}
  .remove-x{
    position:absolute;top:8px;right:8px;
    width:20px;height:20px;border-radius:50%;
    background:rgba(43,38,34,0.06);
    border:none;color:var(--ink-soft);
    font-size:12px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .remove-x:hover{background:var(--rose);color:#fff;}

  .empty{
    color:var(--ink-soft);font-size:14px;
    border:1px dashed var(--line);border-radius:12px;
    padding:18px;text-align:center;
  }

  /* lookbook results */
  .lookbook{display:flex;flex-direction:column;gap:14px;}
  .look-row{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 20px;
    display:flex;
    gap:16px;
    align-items:center;
  }
  .look-rank{
    font-family:'Playfair Display', serif;
    font-size:22px;color:var(--gold);
    width:30px;flex-shrink:0;
  }
  .look-pieces{
    display:flex;flex-wrap:wrap;gap:8px;flex:1;
  }
  .piece-chip{
    display:flex;align-items:center;gap:7px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px 12px 5px 6px;
    font-size:13px;
  }
  .piece-dot{width:16px;height:16px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);flex-shrink:0;}
  .look-score{
    text-align:right;flex-shrink:0;width:90px;
  }
  .look-score .pct{font-size:18px;font-weight:600;color:var(--sage-deep);}
  .look-score .lbl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;}

  .hint{
    font-size:13px;color:var(--ink-soft);margin-top:6px;line-height:1.6;
  }

  @media (max-width:600px){
    .add-grid{grid-template-columns:1fr 1fr;}
    .btn-add{grid-column:1/-1;}
    h1{font-size:30px;}
    .look-row{flex-wrap:wrap;}
    .look-score{width:auto;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">Outfit Match</p>
    <h1>What should I wear today?</h1>
    <p class="sub">Add pieces to your wardrobe, pick the occasion, and get outfit pairings ranked by color match and event fit.</p>
  </header>

  <div class="event-rail" id="eventRail"></div>

  <div class="section-head">
    <h2>Suggested looks</h2>
    <span class="count" id="lookCount"></span>
  </div>
  <div class="lookbook" id="lookbook"></div>
  <p class="hint" id="lookHint"></p>

  <div class="section-head">
    <h2>Your wardrobe</h2>
    <span class="count" id="wardrobeCount"></span>
  </div>

  <div class="add-card">
    <div class="add-grid">
      <div class="field">
        <label for="itemName">Item name</label>
        <input type="text" id="itemName" placeholder="e.g. navy blazer" />
      </div>
      <div class="field">
        <label for="itemCategory">Category</label>
        <select id="itemCategory">
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
          <option value="dress">Dress</option>
          <option value="outerwear">Outerwear</option>
          <option value="shoes">Shoes</option>
          <option value="bag">Bag</option>
          <option value="accessory">Accessory</option>
        </select>
      </div>
      <div class="field">
        <label for="itemColor">Color</label>
        <div class="color-field">
          <input type="color" id="itemColor" value="#3a4a6b" />
          <select id="itemEvents" multiple style="display:none;"></select>
        </div>
      </div>
      <button class="btn-add" id="addBtn">Add to wardrobe</button>
    </div>
  </div>

  <div id="shelves"></div>

</div>

<script>
const STORAGE_KEY = 'outfitmatch_wardrobe_v1';

const EVENTS = [
  { id:'work', label:'Work' },
  { id:'casual', label:'Casual' },
  { id:'date', label:'Date night' },
  { id:'formal', label:'Formal / wedding' },
  { id:'gym', label:'Gym' },
];

// which categories are suited to which events (used as a soft filter, not a hard one)
const EVENT_CATEGORY_FIT = {
  work:    { top:1, bottom:1, dress:1, outerwear:1, shoes:1, bag:1, accessory:0.7 },
  casual:  { top:1, bottom:1, dress:0.8, outerwear:1, shoes:1, bag:1, accessory:1 },
  date:    { top:1, bottom:1, dress:1, outerwear:0.8, shoes:1, bag:1, accessory:1 },
  formal:  { top:0.7, bottom:0.7, dress:1, outerwear:1, shoes:1, bag:1, accessory:1 },
  gym:     { top:1, bottom:1, dress:0.1, outerwear:0.6, shoes:1, bag:0.4, accessory:0.3 },
};

const CATEGORY_LABEL = {
  top:'Tops', bottom:'Bottoms', dress:'Dresses', outerwear:'Outerwear',
  shoes:'Shoes', bag:'Bags', accessory:'Accessories'
};
const CATEGORY_ORDER = ['dress','top','bottom','outerwear','shoes','bag','accessory'];

let wardrobe = [];
let activeEvent = 'work';

function loadWardrobe(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) { wardrobe = JSON.parse(raw); return; }
  }catch(e){}
  // seed with a few starter items so the app isn't empty on first run
  wardrobe = [
    { id:cryptoId(), name:'White button-down', category:'top', color:'#f5f3ee' },
    { id:cryptoId(), name:'Navy blazer', category:'outerwear', color:'#28344f' },
    { id:cryptoId(), name:'Black trousers', category:'bottom', color:'#1d1b19' },
    { id:cryptoId(), name:'Tan loafers', category:'shoes', color:'#b8895f' },
    { id:cryptoId(), name:'Black leather tote', category:'bag', color:'#23201d' },
    { id:cryptoId(), name:'Gold hoop earrings', category:'accessory', color:'#c9a24b' },
    { id:cryptoId(), name:'Denim jacket', category:'outerwear', color:'#6e87a8' },
    { id:cryptoId(), name:'Graphic tee', category:'top', color:'#d6463c' },
    { id:cryptoId(), name:'Blue jeans', category:'bottom', color:'#3b5277' },
    { id:cryptoId(), name:'White sneakers', category:'shoes', color:'#f4f2ee' },
    { id:cryptoId(), name:'Emerald slip dress', category:'dress', color:'#2f5d4a' },
    { id:cryptoId(), name:'Strappy heels', category:'shoes', color:'#8a2f3a' },
  ];
  saveWardrobe();
}

function saveWardrobe(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(wardrobe)); }catch(e){}
}

function cryptoId(){
  return 'id_' + Math.random().toString(36).slice(2,10);
}

/* ---------- color theory helpers ---------- */

function hexToHsl(hex){
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){ h=0; s=0; }
  else{
    const d=max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=(g-b)/d+(g<b?6:0); break;
      case g: h=(b-r)/d+2; break;
      case b: h=(r-g)/d+4; break;
    }
    h*=60;
  }
  return {h,s,l};
}

function isNeutral(hsl){
  // low saturation, or very light/dark = treat as a neutral (pairs with everything)
  return hsl.s < 0.18 || hsl.l < 0.12 || hsl.l > 0.92;
}

// score 0-1 for how well two colors pair, using basic color theory
function colorPairScore(hexA, hexB){
  const a = hexToHsl(hexA), b = hexToHsl(hexB);
  if(isNeutral(a) || isNeutral(b)) return 0.9; // neutrals are safe with anything
  let diff = Math.abs(a.h - b.h);
  if(diff > 180) diff = 360 - diff;
  // analogous (close hues) = good, complementary (~180 apart) = good, in-between = weaker
  const analogous = 1 - Math.min(diff,45)/45;       // best near 0deg apart
  const complementary = 1 - Math.min(Math.abs(diff-180),45)/45; // best near 180deg apart
  const best = Math.max(analogous, complementary);
  return 0.35 + best*0.65; // floor so nothing scores as a total clash
}

/* ---------- outfit generation ---------- */

function buildOutfits(){
  const fit = EVENT_CATEGORY_FIT[activeEvent];
  const byCat = {};
  wardrobe.forEach(it=>{
    if(!fit[it.category] || fit[it.category] < 0.3) return; // exclude poor fits entirely
    (byCat[it.category] = byCat[it.category] || []).push(it);
  });

  const outfits = [];

  function pushOutfit(pieces){
    if(pieces.length < 2) return;
    // average pairwise color score across all pieces, weighted by event fit of each category
    let colorTotal=0, colorPairs=0;
    for(let i=0;i<pieces.length;i++){
      for(let j=i+1;j<pieces.length;j++){
        colorTotal += colorPairScore(pieces[i].color, pieces[j].color);
        colorPairs++;
      }
    }
    const colorScore = colorPairs ? colorTotal/colorPairs : 1;
    const fitScore = pieces.reduce((s,p)=>s+fit[p.category],0)/pieces.length;
    const total = colorScore*0.6 + fitScore*0.4;
    outfits.push({ pieces, score: total });
  }

  // path A: dress-based outfit (dress + shoes + bag + accessory)
  (byCat.dress||[]).forEach(dress=>{
    const shoe = bestMatch(dress, byCat.shoes);
    const bag = bestMatch(dress, byCat.bag);
    const acc = bestMatch(dress, byCat.accessory);
    pushOutfit([dress, shoe, bag, acc].filter(Boolean));
  });

  // path B: top + bottom based outfit
  (byCat.top||[]).forEach(top=>{
    (byCat.bottom||[]).forEach(bottom=>{
      const outer = bestMatch(top, byCat.outerwear);
      const shoe = bestMatch(top, byCat.shoes);
      const bag = bestMatch(top, byCat.bag);
      const acc = bestMatch(top, byCat.accessory);
      pushOutfit([top, bottom, outer, shoe, bag, acc].filter(Boolean));
    });
  });

  outfits.sort((a,b)=>b.score-a.score);
  // de-duplicate near-identical sets by piece id signature
  const seen = new Set();
  const unique = [];
  for(const o of outfits){
    const sig = o.pieces.map(p=>p.id).sort().join(',');
    if(seen.has(sig)) continue;
    seen.add(sig);
    unique.push(o);
    if(unique.length>=6) break;
  }
  return unique;
}

function bestMatch(anchor, candidates){
  if(!candidates || !candidates.length) return null;
  let best=null, bestScore=-1;
  candidates.forEach(c=>{
    const s = colorPairScore(anchor.color, c.color);
    if(s>bestScore){ bestScore=s; best=c; }
  });
  return best;
}

/* ---------- rendering ---------- */

function renderEventRail(){
  const rail = document.getElementById('eventRail');
  rail.innerHTML='';
  EVENTS.forEach(ev=>{
    const btn = document.createElement('button');
    btn.className = 'tag' + (ev.id===activeEvent ? ' active' : '');
    btn.textContent = ev.label;
    btn.onclick = ()=>{ activeEvent = ev.id; renderAll(); };
    rail.appendChild(btn);
  });
}

function renderLookbook(){
  const el = document.getElementById('lookbook');
  const hint = document.getElementById('lookHint');
  const countEl = document.getElementById('lookCount');
  const outfits = buildOutfits();
  el.innerHTML='';

  if(!outfits.length){
    el.innerHTML = `<div class="empty">Add a few more pieces to your wardrobe to see outfit suggestions for this occasion.</div>`;
    countEl.textContent='';
    hint.textContent='';
    return;
  }

  countEl.textContent = outfits.length + (outfits.length===1 ? ' look' : ' looks');
  hint.textContent = 'Ranked by color pairing and fit for the occasion. Neutrals (white, black, beige, navy) pair with everything.';

  outfits.forEach((o,idx)=>{
    const row = document.createElement('div');
    row.className='look-row';
    const piecesHtml = o.pieces.map(p=>`
      <span class="piece-chip">
        <span class="piece-dot" style="background:${p.color}"></span>
        ${escapeHtml(p.name)}
      </span>
    `).join('');
    row.innerHTML = `
      <div class="look-rank">${idx+1}</div>
      <div class="look-pieces">${piecesHtml}</div>
      <div class="look-score">
        <div class="pct">${Math.round(o.score*100)}%</div>
        <div class="lbl">match</div>
      </div>
    `;
    el.appendChild(row);
  });
}

function renderWardrobe(){
  const shelves = document.getElementById('shelves');
  const countEl = document.getElementById('wardrobeCount');
  shelves.innerHTML='';
  countEl.textContent = wardrobe.length + (wardrobe.length===1 ? ' item' : ' items');

  if(!wardrobe.length){
    shelves.innerHTML = `<div class="empty">Your wardrobe is empty. Add your first item above.</div>`;
    return;
  }

  CATEGORY_ORDER.forEach(cat=>{
    const items = wardrobe.filter(i=>i.category===cat);
    if(!items.length) return;
    const shelf = document.createElement('div');
    shelf.className='shelf';
    shelf.innerHTML = `<p class="shelf-label">${CATEGORY_LABEL[cat]}</p>`;
    const grid = document.createElement('div');
    grid.className='shelf-items';
    items.forEach(it=>{
      const card = document.createElement('div');
      card.className='item-card';
      card.innerHTML = `
        <button class="remove-x" aria-label="Remove ${escapeHtml(it.name)}" data-id="${it.id}">&times;</button>
        <div class="swatch" style="background:${it.color}"></div>
        <p class="item-name">${escapeHtml(it.name)}</p>
        <p class="item-meta">${CATEGORY_LABEL[cat]}</p>
      `;
      grid.appendChild(card);
    });
    shelf.appendChild(grid);
    shelves.appendChild(shelf);
  });

  shelves.querySelectorAll('.remove-x').forEach(btn=>{
    btn.onclick = ()=>{
      wardrobe = wardrobe.filter(i=>i.id!==btn.dataset.id);
      saveWardrobe();
      renderAll();
    };
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderAll(){
  renderEventRail();
  renderWardrobe();
  renderLookbook();
}

document.getElementById('addBtn').addEventListener('click', ()=>{
  const nameInput = document.getElementById('itemName');
  const name = nameInput.value.trim();
  const category = document.getElementById('itemCategory').value;
  const color = document.getElementById('itemColor').value;
  if(!name) { nameInput.focus(); return; }
  wardrobe.push({ id:cryptoId(), name, category, color });
  saveWardrobe();
  nameInput.value='';
  nameInput.focus();
  renderAll();
});

document.getElementById('itemName').addEventListener('keydown', (e)=>{
  if(e.key==='Enter') document.getElementById('addBtn').click();
});

loadWardrobe();
renderAll();
</script>
</body>
</html>
